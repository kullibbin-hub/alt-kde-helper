<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="76" y1="64" x2="436" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0083FF"/>
      <stop offset="0.55" stop-color="#0068C6"/>
      <stop offset="1" stop-color="#00B7FF"/>
    </linearGradient>

    <linearGradient id="spark" x1="208" y1="196" x2="304" y2="324" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8FFFF"/>
      <stop offset="1" stop-color="#7DEBFF"/>
    </linearGradient>

    <filter id="shadow" x="60" y="60" width="392" height="392" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#003C7A" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="36" y="36" width="440" height="440" rx="112" fill="url(#bg)"/>
  <circle cx="392" cy="124" r="86" fill="#FFFFFF" opacity="0.10"/>
  <circle cx="122" cy="404" r="78" fill="#FFFFFF" opacity="0.08"/>

  <!-- Main icon -->
  <g filter="url(#shadow)">
    <!-- Gear teeth -->
    <g fill="#FFFFFF">
      <rect x="237" y="88" width="38" height="82" rx="18"/>
      <rect x="237" y="88" width="38" height="82" rx="18" transform="rotate(45 256 260)"/>
      <rect x="237" y="88" width="38" height="82" rx="18" transform="rotate(90 256 260)"/>
      <rect x="237" y="88" width="38" height="82" rx="18" transform="rotate(135 256 260)"/>
      <rect x="237" y="88" width="38" height="82" rx="18" transform="rotate(180 256 260)"/>
      <rect x="237" y="88" width="38" height="82" rx="18" transform="rotate(225 256 260)"/>
      <rect x="237" y="88" width="38" height="82" rx="18" transform="rotate(270 256 260)"/>
      <rect x="237" y="88" width="38" height="82" rx="18" transform="rotate(315 256 260)"/>

      <!-- Gear body -->
      <circle cx="256" cy="260" r="108"/>
    </g>

    <!-- Gear hole -->
    <circle cx="256" cy="260" r="60" fill="#0D5FB5"/>

    <!-- KDE/Plasma inspired center -->
    <path d="M256 190L275 241L326 260L275 279L256 330L237 279L186 260L237 241L256 190Z" fill="url(#spark)"/>
    <circle cx="331" cy="186" r="13" fill="#92F5FF" opacity="0.95"/>
  </g>
</svg>
